name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test (unit tests only)
        run: |
          dotnet test tests/GdbMiClient.Tests --no-restore -c Release
          dotnet test tests/GdbMiBridge.Mcp.Tests --no-restore -c Release --filter "FullyQualifiedName!~E2E"

      - name: Pack
        run: dotnet pack --no-restore -c Release -o nupkg

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: nupkg/
